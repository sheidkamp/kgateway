# ReferenceGrantMode=Strict: TrafficPolicy references an ExtAuth GatewayExtension in another
# namespace WITH a ReferenceGrant. With Strict mode the grant is required and present, so the
# policy is accepted and ExtAuth is applied.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
  namespace: default
spec:
  gatewayClassName: example-gateway-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
  namespace: default
spec:
  parentRefs:
    - name: example-gateway
  hostnames:
    - "example.com"
  rules:
    - backendRefs:
        - name: backend-svc
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: default
spec:
  selector:
    app: backend-svc
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# TrafficPolicy references GatewayExtension in "other-ns".
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: extauth-policy
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: example-route
  extAuth:
    extensionRef:
      name: extauth-ext
      namespace: other-ns
---
# ReferenceGrant allowing TrafficPolicy in "default" to reference GatewayExtension in "other-ns".
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-trafficpolicy-to-extauth
  namespace: other-ns
spec:
  from:
    - group: gateway.kgateway.dev
      kind: TrafficPolicy
      namespace: default
  to:
    - group: gateway.kgateway.dev
      kind: GatewayExtension
---
# GatewayExtension (ExtAuth) lives in "other-ns" and uses a Service in the same namespace.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: extauth-ext
  namespace: other-ns
spec:
  type: ExtAuth
  extAuth:
    grpcService:
      backendRef:
        group: ""
        kind: Service
        name: extauth-svc
        namespace: other-ns
        port: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: extauth-svc
  namespace: other-ns
spec:
  selector:
    app: extauth-svc
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
      appProtocol: kubernetes.io/h2c
