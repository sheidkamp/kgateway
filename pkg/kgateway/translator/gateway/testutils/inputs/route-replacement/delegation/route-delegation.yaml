apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
  namespace: gwtest
spec:
  gatewayClassName: kgateway
  listeners:
    - protocol: HTTP
      port: 8080
      name: http
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-route
  namespace: gwtest
spec:
  parentRefs:
    - name: example-gateway
      namespace: gwtest
  hostnames:
    - "www.example.com"
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /route
      backendRefs:
      - group: delegation.kgateway.dev
        kind: label
        name: http-routes
        namespace: gwtest
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: another-http-route
  namespace: gwtest
  labels:
    delegation.kgateway.dev/label: http-routes
spec:
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /route/another-route
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: httpbin
          port: 8000
          namespace: gwtest
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: gwtest
  labels:
    app: httpbin
    service: httpbin
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app: httpbin

