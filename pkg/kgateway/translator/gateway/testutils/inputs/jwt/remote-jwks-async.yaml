apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
spec:
  gatewayClassName: example-gateway-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
spec:
  parentRefs:
    - name: example-gateway
  hostnames:
    - "example.com"
  rules:
    - backendRefs:
        - name: example-svc
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /foo
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.kgateway.dev
            kind: TrafficPolicy
            name: route-test
---
apiVersion: v1
kind: Service
metadata:
  name: example-svc
spec:
  selector:
    test: test
  ports:
    - protocol: TCP
      port: 80
      targetPort: test
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: route-test
spec:
  jwtAuth:
    extensionRef:
      name: jwt-ext
---
apiVersion: v1
kind: Service
metadata:
  name: remote-jwks
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: jwt-ext
spec:
  jwt:
    providers:
      - name: async-provider
        issuer: https://dev.example.com
        jwks:
          remote:
            url: https://dev.example.com/jwks
            backendRef:
              name: remote-jwks
              port: 8080
            cacheDuration: 5m
            asyncFetch:
              fastListener: true
              failedRefetchDuration: 10s
            retryPolicy:
              numRetries: 3
              backOff:
                baseInterval: 1s
                maxInterval: 30s
