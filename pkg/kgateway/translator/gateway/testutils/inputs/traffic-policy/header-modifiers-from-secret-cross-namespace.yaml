apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
  namespace: default
spec:
  gatewayClassName: example-gateway-class
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "example.com"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
  namespace: default
spec:
  parentRefs:
  - name: example-gateway
  hostnames:
  - "example.com"
  rules:
  - backendRefs:
    - name: example-svc
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
---
# Secret in a different namespace
apiVersion: v1
kind: Secret
metadata:
  name: backend-creds
  namespace: other
type: Opaque
data:
  # X-Api-Key: my-secret-api-key
  X-Api-Key: bXktc2VjcmV0LWFwaS1rZXk=
---
# ReferenceGrant allowing TrafficPolicy in default to reference Secrets in other
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-secret-access
  namespace: other
spec:
  from:
  - group: gateway.kgateway.dev
    kind: TrafficPolicy
    namespace: default
  to:
  - group: ""
    kind: Secret
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: header-modifiers-from-secret-cross-ns
  namespace: default
spec:
  targetRefs:
  - name: example-route
    kind: HTTPRoute
    group: gateway.networking.k8s.io
  headerModifiers:
    request:
      set:
      - name: X-Api-Key
        secretRef:
          name: backend-creds
          key: X-Api-Key
          namespace: other
      add:
      - name: X-Forwarded-Host
        value: example.com
      remove:
      - X-Request-Id
---
# Test service
apiVersion: v1
kind: Service
metadata:
  name: example-svc
  namespace: default
spec:
  selector:
    app: example
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
