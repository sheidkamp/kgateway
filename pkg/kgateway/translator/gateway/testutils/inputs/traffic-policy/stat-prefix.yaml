kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: example-gateway
  namespace: default
spec:
  gatewayClassName: kgateway
  listeners:
  - protocol: HTTP
    port: 8080
    name: http
    hostname: "www.example.com"
---
# Route targeted by a templated stat prefix (via a named rule).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: templated-route
  namespace: default
spec:
  parentRefs:
    - name: example-gateway
  hostnames:
    - "www.example.com"
  rules:
    - name: rule0
      matches:
      - path:
          type: PathPrefix
          value: /templated
      backendRefs:
        - name: example-svc
          port: 80
---
# Route targeted by a literal stat prefix at the route level.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: literal-route
  namespace: default
spec:
  parentRefs:
    - name: example-gateway
  hostnames:
    - "www.example.com"
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /literal
      backendRefs:
        - name: example-svc
          port: 80
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: templated-stat-prefix
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: templated-route
      sectionName: rule0
  statPrefix: "{{ route_namespace }}.{{ route_name }}.{{ rule_name }}"
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: literal-stat-prefix
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: literal-route
  statPrefix: "my-static-prefix"
---
apiVersion: v1
kind: Service
metadata:
  name: example-svc
  namespace: default
spec:
  selector:
    test: test
  ports:
  - protocol: TCP
    port: 80
    targetPort: test
