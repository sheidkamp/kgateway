apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
  namespace: default
spec:
  gatewayClassName: example-gateway-class
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "example.com"
    allowedRoutes:
      namespaces:
        from: All
---
# HTTPRoute in a different namespace from the Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
  namespace: other
spec:
  parentRefs:
  - name: example-gateway
    namespace: default
  hostnames:
  - "example.com"
  rules:
  - backendRefs:
    - name: example-svc
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
---
# Secret in the same namespace as the TrafficPolicy — no ReferenceGrant needed
apiVersion: v1
kind: Secret
metadata:
  name: backend-creds
  namespace: other
type: Opaque
data:
  # X-Api-Key: my-secret-api-key
  X-Api-Key: bXktc2VjcmV0LWFwaS1rZXk=
---
# TrafficPolicy in namespace other (same as secret), targeting HTTPRoute in same namespace
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: header-modifiers-from-secret-policy-cross-ns
  namespace: other
spec:
  targetRefs:
  - name: example-route
    kind: HTTPRoute
    group: gateway.networking.k8s.io
  headerModifiers:
    request:
      set:
      - name: X-Api-Key
        secretRef:
          name: backend-creds
          key: X-Api-Key
          namespace: other
---
# Test service
apiVersion: v1
kind: Service
metadata:
  name: example-svc
  namespace: other
spec:
  selector:
    app: example
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
