kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: example-gateway
  namespace: default
spec:
  gatewayClassName: kgateway
  listeners:
  - protocol: HTTP
    port: 8080
    name: http
    hostname: "www.example.com"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
  namespace: default
spec:
  parentRefs:
    - name: example-gateway
  hostnames:
    - "www.example.com"
  rules:
    - name: rule0
      matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: example-svc
          port: 80
    - name: rule1
      matches:
      - path:
          type: PathPrefix
          value: /no-fault
      backendRefs:
        - name: example-svc
          port: 80
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: fault-injection-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: example-route
      sectionName: rule0
  faultInjection:
    delay:
      fixedDelay: "100ms"
      percentage: 50
    abort:
      httpStatus: 503
      percentage: 25
    maxActiveFaults: 5
---
apiVersion: v1
kind: Service
metadata:
  name: example-svc
  namespace: default
spec:
  selector:
    test: test
  ports:
  - protocol: TCP
    port: 80
    targetPort: test
