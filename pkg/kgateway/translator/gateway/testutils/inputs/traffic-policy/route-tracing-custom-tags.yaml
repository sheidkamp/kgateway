kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: example-gateway
spec:
  gatewayClassName: kgateway
  listeners:
  - protocol: HTTP
    port: 8080
    name: http
    hostname: "www.example.com"
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: ListenerPolicy
metadata:
  name: tracing-provider
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: example-gateway
  default:
    httpSettings:
      tracing:
        provider:
          openTelemetry:
            grpcService:
              backendRef:
                name: otel-collector
                namespace: default
                port: 4317
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
spec:
  parentRefs:
    - name: example-gateway
  hostnames:
    - "www.example.com"
  rules:
    - backendRefs:
        - name: example-svc
          port: 80
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: route-tracing-tags-policy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: example-route
  tracing:
    randomSampling: 50
    attributes:
    - name: "route.id"
      literal:
        value: "my-route"
    - name: "request.id"
      requestHeader:
        name: "x-request-id"
        defaultValue: "unknown"
---
apiVersion: v1
kind: Service
metadata:
  name: example-svc
spec:
  selector:
    test: test
  ports:
  - protocol: TCP
    port: 80
    targetPort: test
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector:
    test: test
  ports:
  - protocol: TCP
    port: 4317
    targetPort: otel
