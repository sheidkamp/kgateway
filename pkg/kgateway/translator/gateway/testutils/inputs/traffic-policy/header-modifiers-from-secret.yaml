apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
  namespace: default
spec:
  gatewayClassName: example-gateway-class
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "example.com"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
  namespace: default
spec:
  parentRefs:
  - name: example-gateway
  hostnames:
  - "example.com"
  rules:
  - backendRefs:
    - name: example-svc
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
---
# Secret containing backend credentials in the same namespace as the policy
apiVersion: v1
kind: Secret
metadata:
  name: backend-creds
  namespace: default
type: Opaque
data:
  # api-key: my-secret-api-key
  api-key: bXktc2VjcmV0LWFwaS1rZXk=
  # tenant-id: tenant-1
  tenant-id: dGVuYW50LTE=
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: header-modifiers-from-secret
  namespace: default
spec:
  targetRefs:
  - name: example-route
    kind: HTTPRoute
    group: gateway.networking.k8s.io
  headerModifiers:
    request:
      set:
      - name: X-Api-Key
        secretRef:
          name: backend-creds
          key: api-key
          namespace: default
      - name: X-Tenant-Id
        secretRef:
          name: backend-creds
          key: tenant-id
          namespace: default
---
# Test service
apiVersion: v1
kind: Service
metadata:
  name: example-svc
  namespace: default
spec:
  selector:
    app: example
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
