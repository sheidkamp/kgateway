apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
  namespace: default
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
  namespace: default
spec:
  parentRefs:
  - name: example-gateway
  hostnames:
  - "example.com"
  rules:
  - backendRefs:
    - group: gateway.kgateway.dev
      kind: Backend
      name: static-dns-backend
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: Backend
metadata:
  name: static-dns-backend
  namespace: default
spec:
  type: Static
  static:
    hosts:
    - host: internal-my-internal-loadbalancer-1998974615.ap-south-1.elb.amazonaws.com
      port: 80
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: BackendConfigPolicy
metadata:
  name: static-dns-backend-hc-policy
  namespace: default
spec:
  targetRefs:
  - name: static-dns-backend
    group: gateway.kgateway.dev
    kind: Backend
  healthCheck:
    healthyThreshold: 3
    unhealthyThreshold: 2
    interval: 30s
    timeout: 5s
    http:
      host: u-devportal-mcp-server.example.com
      path: /ping
