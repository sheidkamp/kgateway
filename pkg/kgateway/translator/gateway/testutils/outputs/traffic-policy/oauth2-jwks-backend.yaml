  filterChains:
  - filters:
    - name: envoy.filters.network.http_connection_manager
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        httpFilters:
        - disabled: true
          name: envoy.filters.http.oauth2/default/oauth-jwks
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.oauth2.v3.OAuth2
            config:
              authScopes:
              - openid
              - email
              authorizationEndpoint: https://auth.example.com/auth
              credentials:
                clientId: client-id
                cookieNames:
                  bearerToken: AccessToken-8420aab23d054d0c
                  codeVerifier: OauthCodeVerifier-8420aab23d054d0c
                  idToken: IdToken-8420aab23d054d0c
                  oauthExpires: OauthExpires-8420aab23d054d0c
                  oauthHmac: OauthHMAC-8420aab23d054d0c
                  oauthNonce: OauthNonce-8420aab23d054d0c
                  refreshToken: RefreshToken-8420aab23d054d0c
                hmacSecret:
                  name: oauth2/hmac_secret/kgateway-system/oauth2-hmac-secret
                  sdsConfig:
                    ads: {}
                    resourceApiVersion: V3
                tokenSecret:
                  name: oauth2/client_secret/default/oauth-client-secret
                  sdsConfig:
                    ads: {}
                    resourceApiVersion: V3
              preserveAuthorizationHeader: true
              redirectPathMatcher:
                path:
                  exact: /callback
              redirectUri: https://test.com/callback
              signoutPath:
                path:
                  exact: /logout
              tokenEndpoint:
                cluster: backend_default_oauth-provider-token_0
                timeout: 15s
                uri: https://auth.example.com/token
        - disabled: true
          name: envoy.filters.http.oauth2/jwt/default/oauth-jwks
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
            providers:
              oauth2/accessToken:
                audiences:
                - client-id
                fromCookies:
                - AccessToken-8420aab23d054d0c
                payloadInMetadata: accessToken
                remoteJwks:
                  httpUri:
                    cluster: backend_default_oauth-provider-jwks_0
                    timeout: 5s
                    uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_abc123/.well-known/jwks.json
            requirementMap:
              oauth2:
                providerName: oauth2/accessToken
        - disabled: true
          name: oauth2_enabled
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
            dynamicModuleConfig:
              name: rust_module
            filterConfig:
              '@type': type.googleapis.com/google.protobuf.StringValue
              value: '{}'
            filterName: rustformation
        - name: envoy.filters.http.router
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        mergeSlashes: true
        normalizePath: true
        rds:
          configSource:
            ads: {}
            resourceApiVersion: V3
          routeConfigName: listener~8080
        statPrefix: http
        useRemoteAddress: true
    name: listener~8080
  name: listener~8080
Routes:
- ignorePortInHostMatching: true
  name: listener~8080
  virtualHosts:
  - domains:
    - test.com
    metadata:
      filterMetadata:
        merge.TrafficPolicy.gateway.kgateway.dev:
          oidc:
          - gateway.kgateway.dev/TrafficPolicy/default/oauth2-jwks-policy
    name: listener~8080~test_com
