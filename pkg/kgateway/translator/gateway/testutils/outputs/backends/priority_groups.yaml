    - lbEndpoints:
      - endpoint:
          address:
            socketAddress:
              address: http-echo.http-echo.svc
              portValue: 3000
          healthCheckConfig:
            hostname: http-echo.http-echo.svc
          hostname: http-echo.http-echo.svc
      - endpoint:
          address:
            socketAddress:
              address: httpbin.default.svc
              portValue: 8000
          healthCheckConfig:
            hostname: httpbin.default.svc
          hostname: httpbin.default.svc
      priority: 1
  name: backend_default_priority-groups_0
- connectTimeout: 5s
  name: test-backend-plugin_default_example-svc_80
Listeners:
- address:
    socketAddress:
      address: '::'
      ipv4Compat: true
      portValue: 80
  filterChains:
  - filters:
    - name: envoy.filters.network.http_connection_manager
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        httpFilters:
        - name: envoy.filters.http.router
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        mergeSlashes: true
        normalizePath: true
        rds:
          configSource:
            ads: {}
            resourceApiVersion: V3
          routeConfigName: listener~80
        statPrefix: http
        useRemoteAddress: true
    name: listener~80
  name: listener~80
Routes:
- ignorePortInHostMatching: true
  name: listener~80
  virtualHosts:
  - domains:
    - failover.example.com
    name: listener~80~failover_example_com
    routes:
    - match:
        prefix: /
      name: listener~80~failover_example_com-route-0-httproute-priority-groups-route-default-0-0-matcher-0
      route:
        cluster: backend_default_priority-groups_0
        clusterNotFoundResponseCode: INTERNAL_SERVER_ERROR
