      '@type': type.googleapis.com/envoy.extensions.clusters.dns.v3.DnsCluster
      dnsLookupFamily: V4_PREFERRED
  connectTimeout: 10s
  healthChecks:
  - healthyThreshold: 1
    httpHealthCheck:
      path: /
    interval: 1s
    timeout: 1s
    unhealthyThreshold: 1
  loadAssignment:
    clusterName: backend_default_priority-groups_0
    endpoints:
    - lbEndpoints:
      - endpoint:
          address:
            socketAddress:
              address: nginx.nginx-shared.svc
              portValue: 8080
          healthCheckConfig:
            hostname: nginx.nginx-shared.svc
