schemaVersion: 2.0.0

# Container structure tests for the envoy-wrapper image.
# Runs Envoy via a shell entrypoint script that supports two modes:
#   1. Envoy sidecar mode (when ENVOY_SIDECAR is set)
#   2. Envoyinit mode (default)
# Base image: cgr.dev/chainguard/glibc-dynamic, plus a busybox binary that
# provides /bin/sh and wget for the entrypoint and preStop hook.

# UID 10101 must match the helm chart's securityContext.runAsUser
# (see pkg/deployer/gateway_parameters.go)
metadataTest:
  user: "10101"
  entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
  cmd: []
  envVars:
    - key: "ENVOY_DYNAMIC_MODULES_SEARCH_PATH"
      value: "/usr/local/lib"

fileExistenceTests:
  - name: "envoyinit binary exists"
    path: "/usr/local/bin/envoyinit"
    shouldExist: true
    permissions: "-rwxr-xr-x"
    isExecutableBy: "owner"

  - name: "docker-entrypoint.sh exists"
    path: "/docker-entrypoint.sh"
    shouldExist: true
    permissions: "-rwxr-xr-x"
    isExecutableBy: "owner"

  - name: "Rust dynamic module exists"
    path: "/usr/local/lib/librust_module.so"
    shouldExist: true

  - name: "envoy binary exists"
    path: "/usr/local/bin/envoy"
    shouldExist: true
    isExecutableBy: "any"

  - name: "ca-certificates installed"
    path: "/etc/ssl/certs/ca-certificates.crt"
    shouldExist: true

  # Provided by the busybox stage; required by the entrypoint script and the
  # graceful-shutdown preStop hook respectively.
  - name: "shell available (busybox)"
    path: "/bin/sh"
    shouldExist: true
    isExecutableBy: "any"

  - name: "wget available (busybox)"
    path: "/usr/bin/wget"
    shouldExist: true
    isExecutableBy: "any"

fileContentTests:
  - name: "entrypoint script has correct shebang"
    path: "/docker-entrypoint.sh"
    expectedContents: ["#!/bin/sh"]

  - name: "entrypoint handles ENVOY_SIDECAR mode"
    path: "/docker-entrypoint.sh"
    expectedContents: ["ENVOY_SIDECAR"]

commandTests:
  # Prove the binary is a loadable ELF for the target arch by running it:
  # envoyinit reads its bootstrap config on startup and exits 1 with
  # "initializer failed" when the file is missing. INPUT_CONF is pointed at a
  # path that cannot exist so the fast exit holds regardless of what config the
  # image ships (no long-running envoy process, so the test cannot hang). The
  # "initializer failed" string is defined in pkg/envoyinit/run.go -- keep the
  # two in sync.
  - name: "envoyinit binary is a valid executable"
    command: "/usr/local/bin/envoyinit"
    envVars:
      - key: "INPUT_CONF"
        value: "/nonexistent/envoy.yaml"
    exitCode: 1
    expectedError: ["initializer failed"]

  - name: "envoy binary is a valid executable"
    command: "/usr/local/bin/envoy"
    args: ["--version"]
    exitCode: 0
