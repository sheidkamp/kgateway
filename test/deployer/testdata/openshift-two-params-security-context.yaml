# Two GatewayParameters objects —
#   1. gwc-params on the GatewayClass: sets replicas:2 AND runAsGroup:5555 on envoy
#   2. gw-params on the Gateway: sets omitDefaultSecurityContext=true with an
#      explicit envoy securityContext (OpenShift-style: NET_BIND_SERVICE + drop ALL)
#
# Expected: the rendered proxy Deployment should merge both security contexts:
#   - runAsGroup:5555 from GWC params (preserved, not wiped)
#   - NET_BIND_SERVICE, drop ALL, runAsNonRoot from GW params
#   - No default runAsUser:10101
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: gwc-params
  namespace: default
spec:
  kube:
    deployment:
      replicas: 2
    envoyContainer:
      securityContext:
        runAsGroup: 5555
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: gw-params
  namespace: default
spec:
  kube:
    omitDefaultSecurityContext: true
    envoyContainer:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          add:
          - NET_BIND_SERVICE
          drop:
          - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
    podTemplate:
      securityContext:
        sysctls:
        - name: net.ipv4.ip_unprivileged_port_start
          value: "0"
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: kgateway
spec:
  controllerName: kgateway.dev/kgateway
  description: Standard class for managing Gateway API ingress traffic.
  parametersRef:
    group: gateway.kgateway.dev
    kind: GatewayParameters
    name: gwc-params
    namespace: default
---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: gw
  namespace: default
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: gw-params
  listeners:
    - protocol: HTTP
      port: 8080
      name: http
      allowedRoutes:
        namespaces:
          from: Same
