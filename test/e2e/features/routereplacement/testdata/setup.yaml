---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw
  namespace: default
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    port: 8080
    protocol: HTTP
    hostname: "*.example.com"
    allowedRoutes:
      namespaces:
        from: All
---
# Exposes the controller's /metrics endpoint to the curl pod so the route
# replacement metric tests can scrape it via ServiceFQDN.
apiVersion: v1
kind: Service
metadata:
  name: kgateway-metrics
  namespace: route-replacement-test
spec:
  selector:
    app.kubernetes.io/name: kgateway
  ports:
  - protocol: TCP
    port: 9092
    targetPort: metrics
    name: metrics
