# Self-signed ECDSA P-256 TLS certificate for example.com used in frontend TLS tests
# Generated with:
#   openssl ecparam -out tls.key -name prime256v1
#   openssl req -x509 -nodes -days 3650 -key tls.key \
#     -out tls.crt \
#     -subj "/C=US/ST=California/L=San Francisco/O=Example Inc./CN=example.com" \
#     -addext "subjectAltName=DNS:example.com,DNS:www.example.com"
#
# Then base64 encoded for Kubernetes:
#   cat tls.crt | base64 -w 0
#   openssl ec -in tls.key | base64 -w 0
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: test-tls-ecdsa-p256
data:
  tls.crt: 
  tls.key: 
