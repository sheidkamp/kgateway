# Client certificate with non-matching signature for signature-algorithm testing
# This certificate has an ECDSA+SHA256 signature and should be rejected
# Generated with:
#   openssl ecparam -out client-non-matching-signature.key -name secp256r1 -genkey
#   openssl req -new -key client-non-matching-signature.key -out client-non-matching-signature.csr -subj "/CN=client.example.com/O=Test Org"
#   openssl x509 -req -days 3650 -in client-non-matching-signature.csr -CA ca-sigalgs-cert.pem -CAkey ca-sigalgs-key.pem -CAcreateserial -out client-non-matching-signature.crt -sha256
#   # Then base64 encode and update tls.crt and tls.key (without EC parameters) in this file
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: client-non-matching-signature
  namespace: curl-frontendtls
data:
  tls.crt: 
  tls.key: 
