# Client certificate with matching signature for signature-algorithm testing
# This certificate has an RSA+SHA256 signature and should be accepted
# Generated with:
#   openssl genrsa -out client-matching-signature.key 2048
#   openssl req -new -key client-matching-signature.key -out client-matching-signature.csr -subj "/CN=client.example.com/O=Test Org"
#   openssl x509 -req -days 3650 -in client-matching-signature.csr -CA ca-sigalgs-cert.pem -CAkey ca-sigalgs-key.pem -CAcreateserial -out client-matching-signature.crt -sha256
#   # Then base64 encode and update tls.crt and tls.key in this file
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: client-matching-signature
  namespace: curl-frontendtls
data:
  tls.crt: 
  tls.key: 
