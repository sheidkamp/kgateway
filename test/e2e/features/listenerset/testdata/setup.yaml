kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: gw
spec:
  gatewayClassName: kgateway
  listeners:
    - protocol: HTTP
      port: 80
      name: http
      allowedRoutes:
        namespaces:
          from: Same
    - protocol: HTTP
      port: 8081
      name: http-2
      allowedRoutes:
        namespaces:
          from: Same
  allowedListeners:
    namespaces:
      from: Selector
      selector:
        matchLabels:
          allowed: ns
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
spec:
  parentRefs:
    - name: gw
  hostnames:
    - "example.com"
  rules:
    - backendRefs:
        # references the shared nginx Service (ns nginx-shared) cross-namespace;
        - name: nginx
          namespace: nginx-shared
          port: 8080
---
apiVersion: v1
kind: Namespace
metadata:
  name: allowed-ns
  labels:
    allowed: ns
---
# Authorizes the default-ns HTTPRoutes in this suite to reference the shared nginx
# Service (ns nginx-shared) cross-namespace.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-default-httproutes
  namespace: nginx-shared
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: default
  to:
    - group: ""
      kind: Service
