apiVersion: v1
kind: Service
metadata:
  name: nginx-tlsroute-invalid
  namespace: kgateway-base
spec:
  selector:
    app.kubernetes.io/name: nginx
  ports:
  - protocol: TCP
    port: 8443
    targetPort: https-web-svc
    name: https
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: invalid-tlsroute-gateway
  namespace: kgateway-base
spec:
  gatewayClassName: kgateway
  listeners:
  - name: tls
    protocol: TLS
    port: 9443
    hostname: example.com
    tls:
      mode: Terminate
      certificateRefs:
      - name: certs
    allowedRoutes:
      namespaces:
        from: Same
      kinds:
      - kind: TLSRoute
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: invalid-tlsroute-backend-tls
  namespace: kgateway-base
spec:
  parentRefs:
  - name: invalid-tlsroute-gateway
    sectionName: tls
  hostnames:
  - example.com
  rules:
  - backendRefs:
    - name: nginx-tlsroute-invalid
      port: 8443
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: invalid-tlsroute-backend-tls
  namespace: kgateway-base
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: nginx-tlsroute-invalid
  validation:
    hostname: example.com
    caCertificateRefs:
    - group: ""
      kind: ConfigMap
      name: missing-ca
