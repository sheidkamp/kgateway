apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route-for-get-cookie-i
spec:
  parentRefs:
    - name: gw
  hostnames:
    - "example-get-cookie-i.com"
  rules:
    - backendRefs:
        - name: simple-svc
          port: 8080
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: example-traffic-policy-for-get-cookie-i
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: example-route-for-get-cookie-i
  transformation:
    request:
      set:
        # Cookie header sends "Session" (capital S) but lookup uses lowercase — should match.
        - name: x-session-lower-lookup
          value: '{{get_cookie_i("session")}}'
        # Uppercase lookup key — should also match "Session" cookie.
        - name: x-session-upper-lookup
          value: '{{get_cookie_i("SESSION")}}'
        # Mixed-case cookie name "User" looked up with lowercase.
        - name: x-user
          value: '{{get_cookie_i("user")}}'
        # Second Cookie header: "foo" looked up with uppercase — should still match.
        - name: x-foo-upper-lookup
          value: '{{get_cookie_i("FOO")}}'
        # Missing cookie — empty result causes header removal.
        - name: x-missing
          value: '{{get_cookie_i("missing")}}'
