apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headermods-route-1
  namespace: kgateway-base
spec:
  parentRefs:
    - name: headermods-gateway
      namespace: kgateway-base
  hostnames:
    - "example.com"
  rules:
    - backendRefs:
      - name: headermods-httpbin
        port: 8000
