# Gateway-targeted policy must be co-located with the Gateway it targets
# (policy targetRefs are namespace-local), so it lives in kgateway-base
# alongside the shared base gateway.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: header-modifiers-gw-policy
  namespace: kgateway-base
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
  headerModifiers:
    request:
      add:
        - name: X-Custom-Request-Header
          value: custom-request-value-gw
      set:
        - name: X-Custom-Request-Header-Set
          value: custom-request-value-gw
      remove:
        - X-Request-Id
    response:
      add:
        - name: X-Custom-Response-Header
          value: custom-response-value-gw
      set:
        - name: X-Custom-Response-Header-Set
          value: custom-response-value-gw
      remove:
        - X-Envoy-Upstream-Service-Time
