apiVersion: v1
kind: Secret
metadata:
  name: backend-creds
  namespace: default
type: Opaque
stringData:
  api-key: my-secret-api-key
  tenant-id: tenant-abc
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: header-modifiers-from-secret-policy
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: svc-route-1
  headerModifiers:
    request:
      set:
      - name: X-Api-Key
        secretRef:
          name: backend-creds
          key: api-key
          namespace: default
      - name: X-Tenant-Id
        secretRef:
          name: backend-creds
          key: tenant-id
          namespace: default
      remove:
      - X-Request-Id
    response:
      remove:
      - X-Envoy-Upstream-Service-Time
