---
# Tests that the HTTP ACL filter emits dynamic metadata under namespace
# dev.kgateway.http.acl, key blocked-by, which is captured in access logs.
# Rules: deny 10.0.0.0/8 (named), deny 192.168.0.0/16 (unnamed); defaultAction=deny.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route
  namespace: kgateway-base
spec:
  hostnames:
    - httpbin
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: kgateway-base
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: httpbin
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: http-acl-dynamic-metadata
  namespace: kgateway-base
spec:
  targetRefs:
    - name: httpbin-route
      kind: HTTPRoute
      group: gateway.networking.k8s.io
  acl:
    defaultAction: deny
    rules:
      - name: block-internal-range
        cidrs:
          - "10.0.0.0/8"
        action: deny
      - cidrs:
          - "192.168.0.0/16"
        action: deny
      - cidrs:
          - "203.0.113.0/24"
        action: allow
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: HTTPListenerPolicy
metadata:
  name: acl-access-log
  namespace: kgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
  accessLog:
    - fileSink:
        path: /dev/stdout
        jsonFormat:
          blocked_by: "%DYNAMIC_METADATA(dev.kgateway.http.acl:blocked-by)%"
          response_code: "%RESPONSE_CODE%"
          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
