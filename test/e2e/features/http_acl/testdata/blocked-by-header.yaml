---
# Surface the block reason in a response header via blockedByHeaderName.
# Corresponds to the internal/envoy_modules/filters/http-acl/README.md
# "Surface the block reason in a response header" example.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route
  namespace: kgateway-base
spec:
  hostnames:
    - httpbin
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: kgateway-base
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: httpbin
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: http-acl-blocked-by-header
  namespace: kgateway-base
spec:
  targetRefs:
    - name: httpbin-route
      kind: HTTPRoute
      group: gateway.networking.k8s.io
  acl:
    defaultAction: deny
    denyResponse:
      blockedByHeaderName: X-Blocked-By
    rules:
      - name: block-internal-range
        cidrs:
          - "10.0.0.0/8"
        action: deny
      - cidrs:
          - "192.168.0.0/16"
        action: deny
      - cidrs:
          - "203.0.113.0/24"
        action: allow
