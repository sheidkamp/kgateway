---
# Custom deny status code and extra response headers.
# Corresponds to the internal/envoy_modules/filters/http-acl/README.md
# "Custom deny status code and headers" example.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route
  namespace: kgateway-base
spec:
  hostnames:
    - httpbin
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: kgateway-base
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: httpbin
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: http-acl-custom-deny-response
  namespace: kgateway-base
spec:
  targetRefs:
    - name: httpbin-route
      kind: HTTPRoute
      group: gateway.networking.k8s.io
  acl:
    defaultAction: deny
    denyResponse:
      statusCode: 451
      headers:
        - name: X-Blocked-Reason
          value: geo-policy
        - name: Retry-After
          value: "3600"
