---
# Large-ruleset stress test: 200 rules x 20 CIDRs covering IPv4 and IPv6 variants.
# IPv4: /8, /12, /16, /24, /32, and default 0.0.0.0/0.
# IPv6: short (::1/128, fe80::/10, ::/0), long (2001:0db8:0000:...), partial
#       compression (2001:db8::x:y/128), /48, /64, /96, /128,
#       IPv4-mapped (::ffff:x.x.x.x), ULA (fd00::/8), multicast (ff00::/8).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route
  namespace: kgateway-base
spec:
  hostnames:
    - httpbin
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: kgateway-base
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: httpbin
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: HTTPListenerPolicy
metadata:
  name: acl-access-log
  namespace: kgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
  accessLog:
    - fileSink:
        path: /dev/stdout
        jsonFormat:
          blocked_by: "%DYNAMIC_METADATA(dev.kgateway.http.acl:blocked-by)%"
          response_code: "%RESPONSE_CODE%"
          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
---
