apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: nginx
data:
  nginx.conf: |
    user nginx;
    worker_processes  1;
    events {
      worker_connections  10240;
    }
    http {
      # cleartext server
      server {
        listen              80;
        server_name         nginx.nginx;

        location / {
          root   /usr/share/nginx/html;
          index  index.html index.htm;
        }
      }

      # Simple TLS server
      server {
        listen              443 ssl;
        server_name         nginx.nginx;
        ssl_certificate     /etc/nginx/example.crt;
        ssl_certificate_key /etc/nginx/example.key;

        location / {
          root   /usr/share/nginx/html;
          index  index.html index.htm;
        }
      }

      # mTLS server
      server {
        listen              543 ssl;
        server_name         nginx.nginx;
        ssl_certificate     /etc/nginx/example.crt;
        ssl_certificate_key /etc/nginx/example.key;

        # Client certificate verification (for mTLS)
        ssl_client_certificate /etc/nginx/ca.crt;  # CA to validate client certs
        ssl_verify_client      on;                 # Require client certs
        ssl_verify_depth       2;

        location / {
          root   /usr/share/nginx/html;
          index  index.html index.htm;
        }
      }
    }
