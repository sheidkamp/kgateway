# Mode=AppendForward with Subject + URI.
# Test asserts: backend sees the spoofed inbound XFCC PLUS the gateway's own
# entry, comma-separated.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: ListenerPolicy
metadata:
  name: forward-client-cert
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gw
      sectionName: mtls-https
  default:
    httpSettings:
      forwardClientCertDetails:
        mode: AppendForward
        details:
          subject: true
          uri: true
