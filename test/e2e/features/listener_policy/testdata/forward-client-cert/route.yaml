# Routes traffic on the gw 'mtls-https' listener to the request-id-echo
# backend. We reuse request-id-echo because it echoes every request header
# in the response body, which lets us assert on x-forwarded-client-cert.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forward-client-cert-route
  namespace: default
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gw
      namespace: default
      sectionName: mtls-https
  hostnames:
    - gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: request-id-echo
          port: 8000
