# Mode=ForwardOnly, no details.
# Test asserts: backend sees the spoofed inbound XFCC verbatim, with no
# gateway-added entry.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: ListenerPolicy
metadata:
  name: forward-client-cert
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gw
      sectionName: mtls-https
  default:
    httpSettings:
      forwardClientCertDetails:
        mode: ForwardOnly
