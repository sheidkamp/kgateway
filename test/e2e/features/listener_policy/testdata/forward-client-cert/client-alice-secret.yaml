# Alice's client cert + key, mounted into the curl-mtls pod for outgoing
# mTLS requests. Same CA also goes here so the curl pod can verify the
# gateway server cert.
# Subject: CN=alice, O=acme, OU=engineering
# SANs:    URI=spiffe://acme.example.com/ns/team-alpha/sa/alice
#          DNS=alice.acme.example.com
apiVersion: v1
kind: Secret
metadata:
  name: forward-client-cert-alice
  namespace: curl
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: v1
kind: Secret
metadata:
  name: forward-client-cert-ca
  namespace: curl
type: Opaque
data:
  ca.crt: 
