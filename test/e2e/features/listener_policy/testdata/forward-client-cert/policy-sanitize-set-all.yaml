# Mode=SanitizeSet with every detail enabled.
# Test asserts: backend sees XFCC with Hash, Cert, Chain, Subject, URI, DNS.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: ListenerPolicy
metadata:
  name: forward-client-cert
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gw
      sectionName: mtls-https
  default:
    httpSettings:
      forwardClientCertDetails:
        mode: SanitizeSet
        details:
          subject: true
          cert: true
          chain: true
          uri: true
          dns: true
