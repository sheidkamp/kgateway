kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: gw
spec:
  gatewayClassName: kgateway
  listeners:
    - protocol: HTTP
      port: 8080
      name: http
      allowedRoutes:
        namespaces:
          from: Same
    - protocol: HTTP
      port: 8081
      name: other
      allowedRoutes:
        namespaces:
          from: Same
    # mTLS-terminating listener used by the TestForwardClientCert* tests.
    # The server cert Secret is provisioned in setup.yaml so this listener
    # is always programmable; client-cert validation is enabled per-test
    # via the mtls-validation ListenerPolicy.
    - protocol: HTTPS
      port: 8443
      name: mtls-https
      hostname: gateway.local
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: forward-client-cert-server
      allowedRoutes:
        namespaces:
          from: Same
