apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route-req-decompress
  namespace: kgateway-base
spec:
  parentRefs:
    - name: gateway
      namespace: kgateway-base
  hostnames:
    - "req-decompress.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: httpbin
          port: 8000
---
# Response compression lets the tests produce a brotli/zstd-encoded body to post back, and request
# decompression is what the tests actually exercise.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: route-req-decompress
  namespace: kgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httpbin-route-req-decompress
  compression:
    responseCompression:
      libraries:
        - Brotli
        - Zstd
    requestDecompression:
      libraries:
        - Brotli
        - Zstd
