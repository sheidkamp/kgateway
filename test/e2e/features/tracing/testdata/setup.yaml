# The httpbin backend (Service httpbin.httpbin:8000) is the shared fixture applied at base
# level by common.SetupSharedHttpbinBackend; this suite only creates its own routing objects.
# Objects in the shared httpbin namespace use suite-unique names to avoid cross-suite collisions.
---
# Custom GWP to define OTEL_RESOURCE_ATTRIBUTES required for the environment detector
kind: GatewayParameters
apiVersion: gateway.kgateway.dev/v1alpha1
metadata:
  name: tracing-params
spec:
  kube:
    envoyContainer:
      env:
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: "environment=detector,resource=attribute,service.namespace=test"
---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: gw
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      name: tracing-params
      group: gateway.kgateway.dev
      kind: GatewayParameters
  listeners:
    - protocol: HTTP
      port: 8080
      name: http
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tracing
  namespace: httpbin
  labels:
    example: tracing-route
spec:
  parentRefs:
    - name: gw
      namespace: default
  hostnames:
    - "www.example.com"
  rules:
    - backendRefs:
        - name: httpbin
          port: 8000
---
