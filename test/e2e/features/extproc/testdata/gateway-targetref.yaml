---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-1
spec:
  parentRefs:
    - name: gateway
      namespace: kgateway-base
  hostnames:
    - "www.example.com"
  rules:
    - backendRefs:
        - name: ext-proc-backend
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-2
spec:
  parentRefs:
    - name: gateway
      namespace: kgateway-base
  hostnames:
    - "www.example.com"
  rules:
    - name: rule0
      matches:
        - path:
            type: PathPrefix
            value: /myapp
      backendRefs:
        - name: ext-proc-backend
          port: 3000
    - name: rule1
      matches:
        - path:
            type: PathPrefix
            value: /extproc-disabled
      backendRefs:
        - name: ext-proc-backend
          port: 3000
---
# Gateway-targeted policy must be co-located with the Gateway it targets
# (policy targetRefs are namespace-local), so it lives in kgateway-base
# alongside the shared base gateway.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: ext-proc-gateway-extension
  namespace: kgateway-base
spec:
  type: ExtProc
  extProc:
    grpcService:
      backendRef:
        name: ext-proc-grpc
        namespace: default
        port: 4444
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: gateway-test
  namespace: kgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
  extProc:
    extensionRef:
      name: ext-proc-gateway-extension
---
# Allow the kgateway-base GatewayExtension to reference the ext-proc gRPC
# service that lives in the default namespace.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: extproc-grpc-from-kgateway-base
  namespace: default
spec:
  from:
    - group: gateway.kgateway.dev
      kind: GatewayExtension
      namespace: kgateway-base
  to:
    - group: ""
      kind: Service
      name: ext-proc-grpc
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: disable-extproc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: route-2
      sectionName: rule1
  extProc:
    disable: {}
