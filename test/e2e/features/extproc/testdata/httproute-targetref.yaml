---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-with-extproc
spec:
  parentRefs:
    - name: gateway
      namespace: kgateway-base
  hostnames:
    - "www.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /myapp
      backendRefs:
        - name: ext-proc-backend
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-without-extproc
spec:
  parentRefs:
    - name: gateway
      namespace: kgateway-base
  hostnames:
    - "www.example.com"
  rules:
    - backendRefs:
        - name: ext-proc-backend
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: httproute-test
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: route-with-extproc
  extProc:
    extensionRef:
      name: ext-proc-extension
