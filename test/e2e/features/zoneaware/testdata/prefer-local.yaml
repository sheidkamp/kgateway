apiVersion: gateway.kgateway.dev/v1alpha1
kind: BackendConfigPolicy
metadata:
  name: zone-backend-policy
  namespace: zone-aware
spec:
  targetRefs:
  - name: zone-backend
    group: ""
    kind: Service
  loadBalancer:
    roundRobin: {}
    zoneAware:
      preferLocal:
        minEndpointsThreshold: 1
        routingEnabled: 100
