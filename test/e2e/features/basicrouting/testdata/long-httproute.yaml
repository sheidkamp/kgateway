# Checks a very long HTTPRoute name still routes; backed by default-ns httpbin (no ReferenceGrant needed).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: very-long-httproute-name-to-verify-routing-behavior-still-works-much-more-longer
  namespace: default
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "long.example.com"
  rules:
    - backendRefs:
        - name: httpbin
          port: 8000
