# example-svc (ns nginx-shared) selects the shared nginx pod; default-ns routes reach it cross-namespace.
apiVersion: v1
kind: Service
metadata:
  name: example-svc
  namespace: nginx-shared
spec:
  selector:
    app.kubernetes.io/name: nginx
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http-web-svc
