name: Install staged chart
description: >-
  Download the packaged charts artifact and install them into the current cluster,
  pointing the images at the staged (not-yet-published) tag. Used by the gate jobs
  so they exercise the exact chart bytes the publish job ships.

inputs:
  version:
    description: Chart version to install (the packaged .tgz version)
    required: true
  image-registry:
    description: Registry to pull the staged images from
    required: true
  stage-tag:
    description: Image tag of the staged (not-yet-published) images
    required: true

runs:
  using: composite
  steps:
    - name: Download packaged charts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: helm-charts
        path: _test

    - name: Install the staged chart
      shell: bash
      run: |
        # install the crds first (from the packaged chart)
        go tool helm install kgateway-crds _test/kgateway-crds-${{ inputs.version }}.tgz \
          --wait --timeout 5m

        # install the main chart, pointing images at the staged (not-yet-published) tag
        go tool helm install --create-namespace --namespace kgateway-system kgateway \
          _test/kgateway-${{ inputs.version }}.tgz \
          --set image.registry=${{ inputs.image-registry }} \
          --set image.tag=${{ inputs.stage-tag }} \
          --wait --timeout 5m
