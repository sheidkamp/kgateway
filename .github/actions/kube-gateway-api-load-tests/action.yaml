name: 'KGateway Load Tests'
description: 'Run KGateway load testing suite'

inputs:
  cluster-node-version:
    description: "Kind node version (e.g. v1.32.5@sha256:...)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Prep Go Runner
      uses: ./.github/actions/prep-go-runner

    - name: Download module dependencies
      shell: bash
      run: make mod-download

    - name: Setup kind cluster
      shell: bash
      run: ./hack/kind/setup-kind.sh
      env:
        SKIP_DOCKER: "false"
        CLUSTER_NODE_VERSION: ${{ inputs.cluster-node-version }}

    - name: Install KGateway CRDs via Helm
      shell: bash
      run: |
        go tool helm upgrade --install kgateway-crds ./install/helm/kgateway-crds/ \
          --namespace kgateway-system --create-namespace \
          --wait --timeout 5m

    - name: Run load tests in each validation mode
      shell: bash
      env:
        KGATEWAY_RUN_LOAD_TESTS: "true"
      run: |
        set -euo pipefail

        for validation_mode in standard strict; do
          echo "::group::KGateway load tests validation.level=${validation_mode}"

          go tool helm upgrade --install kgateway ./install/helm/kgateway/ \
            --namespace kgateway-system --create-namespace \
            --set image.tag=${VERSION:-v1.0.0-ci1} \
            --set image.registry=ghcr.io/kgateway-dev \
            --set validation.level="${validation_mode}" \
            --wait --timeout 5m

          kubectl wait --for=condition=available --timeout=5m deployment/kgateway -n kgateway-system
          VALIDATION_MODE="${validation_mode}" make run-load-tests

          echo "::endgroup::"
        done
