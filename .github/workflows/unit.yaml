name: Unit Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

env:
  VERSION: 'v1.0.0-ci1'
  GITHUB_TOKEN: ${{ github.token }}
  GO_TEST_RETRIES: 2
  ENVOYINIT_CACHE_REF: ghcr.io/${{ github.repository_owner }}/envoy-wrapper-cache

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # Runs the unit tests for Go packages
  go:
    name: Go Unit Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        fetch-depth: 0
    - name: Setup Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version-file: go.mod
    - name: Install dependencies
      run: make mod-download
    - name: Detect validator image rebuild
      id: validator-image
      shell: bash
      run: |
        set -euo pipefail

        rebuild=false
        if [[ "${{ github.event_name }}" == "merge_group" ]]; then
          rebuild=true
        elif ! git diff --quiet "${{ github.event.pull_request.base.sha }}...HEAD" -- cmd/envoyinit/ internal/envoy_modules/ Makefile; then
          rebuild=true
        fi

        sha="$(git rev-parse --short=12 HEAD)"
        {
          echo "rebuild=${rebuild}"
          echo "image=ghcr.io/kgateway-dev/envoy-wrapper:pr-${sha}"
          echo "version=pr-${sha}"
        } >> "$GITHUB_OUTPUT"
    - name: Setup Buildx
      if: ${{ steps.validator-image.outputs.rebuild == 'true' }}
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
    - name: Build validator image
      if: ${{ steps.validator-image.outputs.rebuild == 'true' }}
      env:
        VERSION: ${{ steps.validator-image.outputs.version }}
      run: make envoy-wrapper-docker
    - name: Use locally built validator image
      if: ${{ steps.validator-image.outputs.rebuild == 'true' }}
      shell: bash
      run: |
        echo "KGATEWAY_VALIDATOR_ENVOY_IMAGE=${{ steps.validator-image.outputs.image }}" >> "$GITHUB_ENV"
        echo "KGATEWAY_VALIDATOR_DOCKER_PULL_POLICY=never" >> "$GITHUB_ENV"
    - name: Run Tests
      shell: bash
      run: make unit-with-coverage
    - name: Validate Test Coverage
      shell: bash
      # The make will error if test coverage drops below a certain threshold
      # We intentionally ignore the errors while we build out our test coverage, to establish a good baseline
      # However, we should strive to establish a baseline, and then make it required on PRs
      run: make --always-make --ignore-errors validate-test-coverage

  # Catches version drift between go.mod, Dockerfile, and Makefile
  version-drift:
    name: Version Drift Check
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Setup Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version-file: tools/go.mod
    - name: Run drift tests
      working-directory: tools
      run: go test -v -count=1 ./build-tools/
