name: Cache Setup

on:
  # We utilize this job to seed the GitHub action cache(s) for the LTS branch
  push:
    branches:
      - 'main'
      - 'v1.**.x'

env:
  CGO_ENABLED: '0'

jobs:
  setup-go-caches:
    name: Setup Go Caches
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Prep Go Runner
        id: prep-go-runner
        uses: ./.github/actions/prep-go-runner
      - name: Prime Go Build Cache
        if: steps.prep-go-runner.outputs.go-build-cache-hit != 'true'
        run: |
          go test -run '^$' ./...
          go test -run '^$' -tags e2e ./...
      - name: Save Go Build Cache
        if: success() && steps.prep-go-runner.outputs.go-build-cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.prep-go-runner.outputs.go-build-cache-path }}
          key: ${{ steps.prep-go-runner.outputs.go-build-cache-key }}
