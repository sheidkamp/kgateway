name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        description: |
          Version override for the release (must start with 'v' followed by semantic version).
          Examples: v1.2.3, v2.0.0-alpha.1, v1.0.0-beta.2
      run_load_tests:
        type: boolean
        default: false
        description: "Run load tests against the staged artifacts before publishing (does not gate the release)"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'v[0-9]*.[0-9]*.x'

# Serialize releases that target the same version: a duplicate dispatch waits for the
# in-flight run rather than racing it (otherwise both could pass the republish guard and
# promote to the same tag from different commits). Cancel-in-progress applies only to
# PRs (normal superseding CI); a release or main build is never cancelled mid-publish.
concurrency:
  group: ${{ github.workflow }}-${{ inputs.version || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # this uses the `github.repository_owner` to support releases from forks (useful for testing).
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  # Only the official kgateway-dev/kgateway repo publishes to the vanity registry. Personal
  # forks publish to ghcr.io/<owner>, so their release notes should point there too — otherwise
  # the install commands in the GitHub release page reference images that don't exist.
  VANITY_REGISTRY: ${{ github.repository == 'kgateway-dev/kgateway' && 'cr.kgateway.dev/kgateway-dev' || format('ghcr.io/{0}', github.repository_owner) }}
  GORELEASER_DISABLE_RELEASE: false
  CGO_ENABLED: '0'

permissions:
  contents: write
  packages: write

jobs:
  setup:
    name: Setup release inputs
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.set_vars.outputs.version }}
      stage_tag: ${{ steps.set_vars.outputs.stage_tag }}
      goreleaser_args: ${{ steps.set_vars.outputs.goreleaser_args }}
      needs_release: ${{ steps.set_vars.outputs.needs_release }}
      previous_tag: ${{ steps.set_vars.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Set the release related variables
        id: set_vars
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          GIT_SHA=$(git rev-parse --short HEAD)

          find_previous_release_notes_tag() {
            local version="$1"

            if [[ ! "$version" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)([-+].*)?$ ]]; then
              echo "Error: Version '$version' does not match required semver format" >&2
              return 1
            fi

            local major="${BASH_REMATCH[1]}"
            local minor="${BASH_REMATCH[2]}"
            local patch="${BASH_REMATCH[3]}"
            local prerelease=""
            if [[ "$version" == *-* ]]; then
              prerelease=1
            fi

            # Final minor release notes should cover everything since the previous
            # minor GA, not just changes since the latest beta/RC tag on the branch.
            if [[ -z "$prerelease" && "$patch" == "0" && "$minor" -gt 0 ]]; then
              local previous_tag="v${major}.$((minor - 1)).0"
              if git rev-parse --verify --quiet "refs/tags/${previous_tag}" >/dev/null; then
                echo "$previous_tag"
                return 0
              fi

              echo "Error: Expected previous minor tag '$previous_tag' to exist for release '$version'" >&2
              return 1
            fi

            git describe --tags --abbrev=0 HEAD 2>/dev/null || true
          }

          # Validate version input for workflow_dispatch
          if [[ ${{ github.event_name }} == 'workflow_dispatch' ]]; then
            VERSION="${{ inputs.version }}"
            # Validate semver format. Modified version from the recommended semver format.
            # See https://semver.org/#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string.
            if ! echo "$VERSION" | grep -q -i -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-z-][0-9a-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-z-][0-9a-z-]*))*))?(\+([0-9a-z-]+(\.[0-9a-z-]+)*))?$'; then
              echo "Error: Version '$VERSION' does not match required semver format (e.g., v1.2.3, v2.0.0-alpha.1)"
              exit 1
            fi
            # Fail fast on a duplicate release. The concurrency group serializes same-version
            # dispatches, so a second run reaches here only after the first has finished and
            # created the tag/release — reject it before spending a full build + gate. The
            # publish job re-checks this immediately before promoting, as a final guard.
            if gh release view "${VERSION}" >/dev/null 2>&1 \
               || git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
              echo "Error: Release ${VERSION} already exists; refusing to re-run."
              exit 1
            fi
            # Find the previous tag for release notes generation
            PREVIOUS_TAG=$(find_previous_release_notes_tag "$VERSION")
            if [ -z "$PREVIOUS_TAG" ]; then
              echo "Error: Could not determine previous tag for release notes"
              exit 1
            fi
            NEEDS_RELEASE=true
            # goreleaser only builds/stages images now (release disabled); the GitHub release and
            # its notes are created by the publish job, so no --release-notes here.
            GORELEASER_ARGS="--clean --skip=validate"
            # Stage built images under a non-semver tag so consumption automation (Kargo,
            # semver-only) does not adopt them before the gate passes. Publishing copies the
            # staged image to ${VERSION} only after validation. The version is included so two
            # different versions built from the same commit don't share a staging tag (the
            # concurrency group serializes by version, not commit); '+' isn't a valid image-tag
            # character, so map any build metadata to '-'.
            STAGE_TAG="stage-${GIT_SHA}-${VERSION//+/-}"
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            VERSION="$(make --no-print-directory print-ROLLING_MAIN_VERSION)"
            NEEDS_RELEASE=false
            GORELEASER_ARGS="--clean --skip=validate"
            # No staging on the rolling-main path; images are tagged at VERSION.
            STAGE_TAG="${VERSION}"
          elif [[ $GITHUB_REF == refs/pull/* ]]; then
            GIT_TAG=$(git describe --tags --abbrev=0)
            PR_NUM=$(echo "${GITHUB_REF}" | sed -E 's|refs/pull/([^/]+)/?.*|\1|')
            VERSION="${GIT_TAG}-pr.${PR_NUM}-${GIT_SHA}"
            NEEDS_RELEASE=false
            GORELEASER_ARGS="--snapshot --clean"
            STAGE_TAG="${VERSION}"
          else
            echo "Unknown event type"
            exit 1
          fi

          # Group redirects to satisfy shellcheck SC2129
          {
            echo "version=${VERSION}"
            echo "stage_tag=${STAGE_TAG}"
            echo "previous_tag=${PREVIOUS_TAG:-}"
            echo "needs_release=${NEEDS_RELEASE}"
            echo "goreleaser_args=${GORELEASER_ARGS}"
          } >> "$GITHUB_OUTPUT"

  helm:
    name: Package helm charts
    # Packaging is independent of the image build, so this runs in parallel with `stage`.
    # The packaged charts are uploaded as an artifact and the gate jobs install those exact
    # bytes. On the release path charts are NOT pushed to the registry here; the publish job
    # re-packages them from the same commit and pushes after the gate passes. Rolling-main
    # builds push directly from this job.
    needs: [setup]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Package kgateway charts
        # Package both the vX.Y.Z and X.Y.Z charts so the publish job can push the exact tested
        # bytes. helm derives the OCI tag from each chart's embedded version, so the two tags are
        # genuinely different artifacts (not one chart aliased twice). The gate installs the
        # v-version; both are uploaded and both are published from those bytes.
        run: |
          for v in "${VERSION}" "${VERSION#v}"; do
            make package-kgateway-charts VERSION="$v"
          done
        env:
          VERSION: ${{ needs.setup.outputs.version }}

      - name: Upload packaged charts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: helm-charts
          path: _test/*.tgz
          retention-days: 1

      # The gate installs with --set image.tag=<stage>, so the chart's own default tag
      # resolution (appVersion -> the kgateway.imageTag helper) is otherwise never exercised —
      # a bad appVersion or a helper regression would ship a chart pointing at a tag that does
      # not exist. Render both published chart versions (v-prefixed and bare, both packaged
      # above) with defaults and assert the controller image resolves to the version we publish.
      - name: Verify charts default to the release image tag
        run: |
          set -euo pipefail
          for v in "${VERSION}" "${VERSION#v}"; do
            if ! go tool helm template kgateway "_test/kgateway-${v}.tgz" | grep -qF "/kgateway:${VERSION}"; then
              echo "chart ${v}: default controller image did not resolve to ${VERSION}"
              go tool helm template kgateway "_test/kgateway-${v}.tgz" | grep -E 'image:' || true
              exit 1
            fi
          done
        env:
          VERSION: ${{ needs.setup.outputs.version }}

      # Rolling-main builds publish charts here (they are never staged/promoted). Release
      # builds (workflow_dispatch) push charts from the publish job instead.
      - name: Helm login to ${{ env.IMAGE_REGISTRY }}
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | go tool helm registry login ${{ env.IMAGE_REGISTRY }} -u ${{ github.repository_owner }} --password-stdin

      - name: Push kgateway charts to registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: make release-charts
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}

  release-notes:
    name: Generate release notes
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: ${{ needs.setup.outputs.needs_release == 'true' }}
        with:
          fetch-depth: 0

      - name: Generate release notes
        if: ${{ needs.setup.outputs.needs_release == 'true' }}
        # Note(tim): CURRENT_TAG defaults to HEAD since the version tag doesn't exist yet.
        # This is because that tag is created by goreleaser. We may want to move tag management
        # outside of goreleaser in the future. The additional benefit of doing that is we can
        # remove the logic where we set --skip-validate when we configure the goreleaser args.
        run: make release-notes PREVIOUS_TAG="${{ needs.setup.outputs.previous_tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release notes
        if: ${{ needs.setup.outputs.needs_release == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-notes
          path: _output/RELEASE_NOTES.md
          retention-days: 1

  stage:
    name: Build and stage images
    needs: [setup]
    runs-on: ubuntu-22.04
    outputs:
      kgateway: ${{ steps.digests.outputs.kgateway }}
      sds: ${{ steps.digests.outputs.sds }}
      envoy_wrapper: ${{ steps.digests.outputs.envoy_wrapper }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Prep Go Runner
        uses: ./.github/actions/prep-go-runner

      - name: Disable goreleaser GitHub release
        # goreleaser only builds and pushes images here (to the stage tag). The git tag and
        # GitHub Release are created by the publish job after the gate passes, so goreleaser
        # must never create a release on any path.
        run: |
          echo "GORELEASER_DISABLE_RELEASE=true" >> "$GITHUB_ENV"

      - name: Log into ghcr.io
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: "docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392" # v3.6.0
        with:
          # Pin the binfmt/QEMU emulator to a specific version. The action caches
          # the emulator image (`cache-image: true`) under a key derived from the
          # image ref; with the default `latest` tag that key is version-less, so a
          # cache populated during QEMU's 8.2-era arm64 ELF-loader regression keeps
          # getting restored even after Docker Hub's `latest` advances. That stale
          # emulator segfaults running arm64 glibc trigger scripts
          # (`Processing triggers for libc-bin ... qemu: uncaught target signal 11`)
          # during cross-platform `docker build`, breaking the arm64 release image.
          # A versioned tag gives a version-specific cache key (sidestepping the
          # poisoned `latest` cache) and a QEMU build that contains the upstream fix.
          image: tonistiigi/binfmt:qemu-v10.2.1
      - uses: "docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2" # v3.10.0

      - name: Disable Docker cache for releases
        if: ${{ needs.setup.outputs.needs_release == 'true' }}
        run: echo "DOCKER_NO_CACHE=1" >> "$GITHUB_ENV"

      - name: Run goreleaser
        run: make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # VERSION stamps the binary (LDFLAGS) with the final published version.
          VERSION: ${{ needs.setup.outputs.version }}
          # ARTIFACT_TAG is the image/manifest tag — the non-semver stage tag on the release path.
          ARTIFACT_TAG: ${{ needs.setup.outputs.stage_tag }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          GORELEASER_ARGS: ${{ needs.setup.outputs.goreleaser_args }}
          GORELEASER_CURRENT_TAG: ${{ needs.setup.outputs.version }}
          GORELEASER_DISABLE_RELEASE: ${{ env.GORELEASER_DISABLE_RELEASE }}

      - name: Install container-structure-test
        shell: bash
        run: |
          set -euo pipefail
          curl -LO https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.19.3/container-structure-test-linux-amd64
          echo "fa0fa333bb6ba5c14065e7468d2904f5c82d021d7e1c763c9a45c5f2fbe9ff5f  container-structure-test-linux-amd64" | sha256sum --check
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run container structure tests
        shell: bash
        run: |
          set -euo pipefail
          for arch in amd64 arm64; do
            for image in kgateway sds envoy-wrapper; do
              echo "Testing ${image} (${arch})..."
              container-structure-test test \
                --image "${{ env.IMAGE_REGISTRY }}/${image}:${{ needs.setup.outputs.stage_tag }}-${arch}" \
                --platform "linux/${arch}" \
                --config "test/container-structure/${image}.yaml"
            done
          done

      - name: Capture staged image digests
        id: digests
        if: ${{ needs.setup.outputs.needs_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "kgateway=$(./hack/ci/manifest-digest.sh "${IMAGE_REGISTRY}/kgateway:${STAGE_TAG}")"
            echo "sds=$(./hack/ci/manifest-digest.sh "${IMAGE_REGISTRY}/sds:${STAGE_TAG}")"
            echo "envoy_wrapper=$(./hack/ci/manifest-digest.sh "${IMAGE_REGISTRY}/envoy-wrapper:${STAGE_TAG}")"
          } >> "$GITHUB_OUTPUT"
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          STAGE_TAG: ${{ needs.setup.outputs.stage_tag }}

  validate:
    name: Validate release artifacts e2e (${{ matrix.arch }})
    needs: [setup, helm, stage]
    # Mandatory gate on the release path: conformance must pass against the staged
    # artifacts before publish. Every workflow_dispatch sets needs_release=true.
    if: ${{ needs.setup.outputs.needs_release == 'true' }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    strategy:
      fail-fast: false
      matrix:
        arch: ['amd64', 'arm64']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Prep Go Runner
        uses: ./.github/actions/prep-go-runner

      - name: Login to ghcr.io
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | go tool helm registry login ${{ env.IMAGE_REGISTRY }} -u ${{ github.repository_owner }} --password-stdin

      - name: Download module dependencies
        run: make mod-download

      - name: Setup kind cluster
        run: ./hack/kind/setup-kind.sh
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          SKIP_DOCKER: "true"

      - name: Install the staged chart
        uses: ./.github/actions/install-staged-chart
        with:
          version: ${{ needs.setup.outputs.version }}
          image-registry: ${{ env.IMAGE_REGISTRY }}
          stage-tag: ${{ needs.setup.outputs.stage_tag }}

      - name: Wait for the kgateway deployment to be ready
        run: |
          kubectl wait --for=condition=available --timeout=5m deployment/kgateway -n kgateway-system

      - name: Run Gateway API Conformance Tests
        run: make all-conformance
        shell: bash
        env:
          VERSION: ${{ needs.setup.outputs.version }}

  load_tests:
    name: Load Testing
    # Advisory: runs against the staged artifact when opted in, but does NOT gate publish.
    needs: [setup, helm, stage]
    if: ${{ inputs.run_load_tests }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Prep Go Runner
        uses: ./.github/actions/prep-go-runner

      - name: Login to ghcr.io
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | go tool helm registry login ${{ env.IMAGE_REGISTRY }} -u ${{ github.repository_owner }} --password-stdin

      - name: Download module dependencies
        run: make mod-download

      - name: Setup kind cluster
        run: ./hack/kind/setup-kind.sh
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          SKIP_DOCKER: "true"

      - name: Install the staged chart
        uses: ./.github/actions/install-staged-chart
        with:
          version: ${{ needs.setup.outputs.version }}
          image-registry: ${{ env.IMAGE_REGISTRY }}
          stage-tag: ${{ needs.setup.outputs.stage_tag }}

      - name: Wait for the kgateway deployment to be ready
        run: |
          kubectl wait --for=condition=available --timeout=5m deployment/kgateway -n kgateway-system

      - name: Run load tests
        run: make run-load-tests
        env:
          VERSION: ${{ needs.setup.outputs.version }}

  publish:
    name: Publish release
    # Gated on the validation jobs that block a release: build + container-structure (in `stage`)
    # and conformance (`validate`). Load tests are intentionally NOT a dependency (advisory).
    needs: [setup, helm, stage, validate, release-notes]
    if: ${{ needs.setup.outputs.needs_release == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Prep Go Runner
        uses: ./.github/actions/prep-go-runner

      - name: Log into ghcr.io
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: "docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2" # v3.10.0

      - name: Helm login to ${{ env.IMAGE_REGISTRY }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | go tool helm registry login ${{ env.IMAGE_REGISTRY }} -u ${{ github.repository_owner }} --password-stdin

      - name: Refuse to republish an existing version
        run: |
          set -euo pipefail
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists; refusing to republish."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists; refusing to republish."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}

      - name: Promote staged images to the published tag
        run: |
          set -euo pipefail
          declare -A expected=(
            [kgateway]="${KGATEWAY_DIGEST}"
            [sds]="${SDS_DIGEST}"
            [envoy-wrapper]="${ENVOY_WRAPPER_DIGEST}"
          )
          for image in kgateway sds envoy-wrapper; do
            src="${IMAGE_REGISTRY}/${image}:${STAGE_TAG}"
            dst="${IMAGE_REGISTRY}/${image}:${VERSION}"
            cur="$(./hack/ci/manifest-digest.sh "$src")"
            exp="${expected[$image]}"
            if [[ "$cur" != "$exp" ]]; then
              echo "stage digest drift for ${image}: ${cur} != gated ${exp}"
              exit 1
            fi
            # Copy the validated bytes by digest; no rebuild.
            docker buildx imagetools create -t "$dst" "${src}@${cur}"
            new="$(./hack/ci/manifest-digest.sh "$dst")"
            if [[ "$new" != "$cur" ]]; then
              echo "promotion mismatch for ${image}: published ${new} != staged ${cur}"
              exit 1
            fi
            echo "promoted ${image} -> ${dst} (${cur})"
          done
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          STAGE_TAG: ${{ needs.setup.outputs.stage_tag }}
          VERSION: ${{ needs.setup.outputs.version }}
          KGATEWAY_DIGEST: ${{ needs.stage.outputs.kgateway }}
          SDS_DIGEST: ${{ needs.stage.outputs.sds }}
          ENVOY_WRAPPER_DIGEST: ${{ needs.stage.outputs.envoy_wrapper }}

      - name: Download the validated charts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: helm-charts
          path: _test

      # Push the exact chart bytes the gate validated — both the vX.Y.Z and X.Y.Z tags — rather
      # than re-packaging. helm derives the OCI tag from each chart's embedded version, so pushing
      # kgateway-<v>.tgz publishes the <v> tag. This is the chart analogue of the images'
      # copy-by-digest: ship what was tested, byte for byte.
      - name: Push the validated charts
        run: |
          set -euo pipefail
          for tgz in _test/*.tgz; do
            go tool helm push "$tgz" oci://"${IMAGE_REGISTRY}"/charts
          done
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}

      - name: Download release notes
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-notes
          path: _output

      - name: Create the GitHub release
        run: |
          set -euo pipefail
          # gh release create makes the git tag at --target, so no separate tag push is needed.
          PRERELEASE_FLAG=""
          if [[ "${VERSION}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --notes-file _output/RELEASE_NOTES.md \
            ${PRERELEASE_FLAG}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}

  smoke:
    name: Post-publish smoke test
    # Alert-only, and by construction NOT a gate: it runs after publish, when the images are
    # already at their final (world-visible) tags, so it cannot prevent a bad release — it can
    # only surface one. A failure means "investigate and roll forward" (ship a patch); it does
    # NOT roll back, and the published tag already blocks a same-version re-run via the publish
    # guard. Its unique coverage vs the gate: it installs the REAL published OCI chart with the
    # chart's DEFAULT image tag (no --set image.tag), exercising appVersion -> :VERSION against
    # the actually-published image. Registry is pointed at where we published so it works on
    # forks; that means the chart's default registry / vanity-mirror path is intentionally not
    # covered here (separate concern).
    needs: [setup, publish]
    if: ${{ needs.setup.outputs.needs_release == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Prep Go Runner
        uses: ./.github/actions/prep-go-runner

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | go tool helm registry login ${{ env.IMAGE_REGISTRY }} -u ${{ github.repository_owner }} --password-stdin

      - name: Setup kind cluster
        run: ./hack/kind/setup-kind.sh
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          SKIP_DOCKER: "true"

      - name: Install the published chart with its default image tag
        run: |
          set -euo pipefail
          go tool helm install kgateway-crds \
            oci://${IMAGE_REGISTRY}/charts/kgateway-crds --version "${VERSION}" \
            --wait --timeout 5m
          # No --set image.tag: the chart's default (appVersion -> :VERSION) must resolve to the
          # published image. Point the registry at where we published so this works on forks too.
          go tool helm install --create-namespace --namespace kgateway-system kgateway \
            oci://${IMAGE_REGISTRY}/charts/kgateway --version "${VERSION}" \
            --set image.registry=${IMAGE_REGISTRY} \
            --wait --timeout 5m
          kubectl wait --for=condition=available --timeout=5m deployment/kgateway -n kgateway-system
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          VERSION: ${{ needs.setup.outputs.version }}

      - name: Confirm the bare-version chart tags were published
        run: |
          set -euo pipefail
          # publish pushes both the v-prefixed and bare-semver chart tags; the install above
          # covered the v-prefixed chart, so confirm the bare-version tags are also pullable.
          go tool helm pull oci://${IMAGE_REGISTRY}/charts/kgateway --version "${VERSION#v}"
          go tool helm pull oci://${IMAGE_REGISTRY}/charts/kgateway-crds --version "${VERSION#v}"
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          VERSION: ${{ needs.setup.outputs.version }}
